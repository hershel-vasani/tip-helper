<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tip Helper" />
  <title>Tip Helper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 16px 40px; }
    h1 { font-size: 2.2rem; font-weight: 800; text-align: center; margin: 16px 0 6px; }
    .subtitle { font-size: 1.1rem; color: #a0a0c0; text-align: center; margin-bottom: 28px; }
    .screen { width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .scan-area { width: 100%; background: #252545; border-radius: 20px; padding: 28px 24px; text-align: center; border: 2px dashed #444466; cursor: pointer; }
    .scan-icon { font-size: 4rem; margin-bottom: 12px; display: block; }
    .scan-area h2 { font-size: 1.6rem; margin-bottom: 8px; }
    .scan-area p { color: #a0a0c0; font-size: 1.05rem; }
    #file-input { display: none; }
    #preview-container { width: 100%; display: none; }
    #preview-img { width: 100%; border-radius: 16px; max-height: 300px; object-fit: contain; background: #252545; }
    .btn-primary { width: 100%; padding: 20px; font-size: 1.3rem; font-weight: 800; border: none; border-radius: 16px; cursor: pointer; background: linear-gradient(135deg, #4f7ef8, #7b5ea7); color: white; display: none; }
    #progress-wrap { width: 100%; display: none; flex-direction: column; gap: 10px; align-items: center; }
    #progress-label { font-size: 1.1rem; color: #a0c0ff; text-align: center; }
    .spinner { width: 48px; height: 48px; border: 5px solid #333355; border-top-color: #4f7ef8; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status-box { width: 100%; padding: 20px; border-radius: 16px; font-size: 1.3rem; font-weight: 700; text-align: center; line-height: 1.5; display: none; }
    .status-included { background: #1a4a2a; border: 2px solid #2ecc71; color: #2ecc71; }
    .status-not-included { background: #4a1a1a; border: 2px solid #e74c3c; color: #f0a0a0; }
    .status-warning { background: #3a2a10; border: 2px solid #f39c12; color: #f9c74f; }
    #bill-display { width: 100%; background: #252545; border-radius: 16px; padding: 18px 20px; text-align: center; display: none; }
    #bill-display .label { font-size: 1rem; color: #a0a0c0; margin-bottom: 6px; }
    #bill-display .amount { font-size: 2.4rem; font-weight: 800; }
    #manual-section { width: 100%; display: none; }
    #manual-section p { font-size: 1rem; color: #a0a0c0; margin-bottom: 10px; text-align: center; }
    .manual-row { display: flex; gap: 10px; }
    input[type="number"] { flex: 1; padding: 16px; font-size: 1.3rem; border-radius: 12px; border: 2px solid #444466; background: #1a1a2e; color: #fff; outline: none; }
    .btn-ok { padding: 16px 22px; font-size: 1.1rem; font-weight: 700; border: none; border-radius: 12px; background: #4f7ef8; color: white; cursor: pointer; }
    #tip-section { width: 100%; display: none; }
    #tip-section h2 { font-size: 1.4rem; text-align: center; margin-bottom: 14px; color: #c0c0e0; }
    .tip-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .tip-btn { background: #252545; border: 3px solid transparent; border-radius: 18px; padding: 18px 10px; cursor: pointer; text-align: center; color: white; }
    .tip-btn.good { border-color: #3498db; }
    .tip-btn.great { border-color: #2ecc71; }
    .tip-btn.excel { border-color: #f39c12; }
    .tip-btn .emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
    .tip-btn .tlabel { font-size: 1.1rem; font-weight: 700; display: block; }
    .tip-btn .pct { font-size: 0.95rem; color: #a0a0c0; display: block; margin-top: 2px; }
    .tip-btn .tip-amt { font-size: 1.5rem; font-weight: 800; display: block; margin-top: 8px; }
    .tip-btn .total-amt { font-size: 0.9rem; color: #a0a0c0; display: block; margin-top: 3px; }
    #result-card { width: 100%; background: #252545; border-radius: 20px; padding: 24px; text-align: center; display: none; border: 3px solid #f39c12; }
    .chosen-label { font-size: 1rem; color: #a0a0c0; margin-bottom: 6px; }
    .chosen-tier { font-size: 2rem; font-weight: 800; margin-bottom: 14px; }
    .result-row { display: flex; justify-content: space-between; font-size: 1.3rem; padding: 8px 0; border-bottom: 1px solid #333355; }
    .result-row .val { font-weight: 700; }
    .result-total { display: flex; justify-content: space-between; font-size: 1.7rem; font-weight: 800; padding-top: 14px; color: #f39c12; }
    #reset-btn { width: 100%; padding: 16px; font-size: 1.1rem; font-weight: 700; border: 2px solid #444466; border-radius: 14px; cursor: pointer; background: transparent; color: #a0a0c0; display: none; }
  </style>
</head>
<body>
  <h1>🧾 Tip Helper</h1>
  <p class="subtitle">Simple tips for any bill</p>
  <div class="screen">
    <div class="scan-area" onclick="document.getElementById('file-input').click()">
      <span class="scan-icon">📷</span>
      <h2>Take a Photo of Your Bill</h2>
      <p>Tap here to use your camera or choose a photo</p>
      <input type="file" id="file-input" accept="image/*" capture="environment" onchange="previewPhoto(event)" />
    </div>
    <div id="preview-container"><img id="preview-img" src="" alt="Bill preview" /></div>
    <button class="btn-primary" id="analyze-btn" onclick="analyzeBill()">🔍 Read My Bill</button>
    <div id="progress-wrap">
      <div class="spinner"></div>
      <div id="progress-label">Reading your bill…</div>
    </div>
    <div id="status-box"></div>
    <div id="bill-display">
      <div class="label">Bill Amount</div>
      <div class="amount" id="bill-amount-text">—</div>
    </div>
    <div id="manual-section">
      <p>Couldn't read the total clearly.<br>Please type it in:</p>
      <div class="manual-row">
        <input type="number" id="manual-amount" placeholder="e.g. 42.50" step="0.01" min="0" />
        <button class="btn-ok" onclick="applyManual()">OK</button>
      </div>
    </div>
    <div id="tip-section">
      <h2>Choose your tip:</h2>
      <div class="tip-grid">
        <div class="tip-btn good" onclick="selectTip('Good', 0.18)">
          <span class="emoji">👍</span><span class="tlabel">Good</span><span class="pct">18%</span>
          <span class="tip-amt" id="tip-good">—</span><span class="total-amt" id="total-good"></span>
        </div>
        <div class="tip-btn great" onclick="selectTip('Great', 0.20)">
          <span class="emoji">😊</span><span class="tlabel">Great</span><span class="pct">20%</span>
          <span class="tip-amt" id="tip-great">—</span><span class="total-amt" id="total-great"></span>
        </div>
        <div class="tip-btn excel" onclick="selectTip('Excellent', 0.25)">
          <span class="emoji">⭐</span><span class="tlabel">Excellent</span><span class="pct">25%</span>
          <span class="tip-amt" id="tip-excel">—</span><span class="total-amt" id="total-excel"></span>
        </div>
      </div>
    </div>
    <div id="result-card">
      <div class="chosen-label">You chose</div>
      <div class="chosen-tier" id="chosen-tier-text"></div>
      <div class="result-row"><span>Bill</span><span class="val" id="res-bill"></span></div>
      <div class="result-row"><span>Tip</span><span class="val" id="res-tip"></span></div>
      <div class="result-total"><span>Total</span><span id="res-total"></span></div>
    </div>
    <button id="reset-btn" onclick="resetApp()">↩ Scan Another Bill</button>
  </div>
  <script>
    let billAmount = null;

    function previewPhoto(event) {
      const file = event.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      document.getElementById('preview-img').src = url;
      document.getElementById('preview-container').style.display = 'block';
      hideResults();
      document.getElementById('analyze-btn').style.display = 'block';
    }

    async function analyzeBill() {
      const imgEl = document.getElementById('preview-img');
      if (!imgEl.src) return;
      document.getElementById('analyze-btn').style.display = 'none';
      document.getElementById('progress-wrap').style.display = 'flex';
      hideResults(true);

      try {
        // Downscale + re-encode to JPEG before sending. This keeps the upload
        // small (under Vercel's request limit), cuts cost, and normalizes
        // iPhone HEIC photos into a format the API reliably accepts.
        const b64 = compressImage(imgEl);

        // Forward the passcode from this page's URL (?key=...) if present
        const key = new URLSearchParams(window.location.search).get('key');
        const endpoint = key ? '/api/analyze?key=' + encodeURIComponent(key) : '/api/analyze';
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: b64 })
        });

        document.getElementById('progress-wrap').style.display = 'none';

        if (!res.ok) {
          const err = await res.json();
          showStatus('status-warning', '⚠️ Error: ' + (err.error || 'Something went wrong'));
          document.getElementById('reset-btn').style.display = 'block';
          return;
        }

        const data = await res.json();
        handleResult(data);
      } catch (err) {
        document.getElementById('progress-wrap').style.display = 'none';
        showStatus('status-warning', '⚠️ Could not connect to server.\nMake sure server.py is running.');
        document.getElementById('analyze-btn').style.display = 'block';
      }
    }

    function handleResult(data) {
      if (data.tip_included) {
        const label = data.tip_label ? ` (${data.tip_label})` : '';
        showStatus('status-included', `✅ Tip Already Included!${label}\nGratuity has been added to this bill.`);
      } else {
        showStatus('status-not-included', '❌ Tip Not Included\nPlease choose a tip below.');
      }

      if (data.total && data.total > 0) {
        billAmount = data.total;
        document.getElementById('bill-amount-text').textContent = fmt(billAmount);
        document.getElementById('bill-display').style.display = 'block';
        populateTipButtons(billAmount);
        document.getElementById('tip-section').style.display = 'block';
      } else {
        document.getElementById('manual-section').style.display = 'block';
      }
      document.getElementById('reset-btn').style.display = 'block';
    }

    function compressImage(imgEl, maxDim = 1600, quality = 0.8) {
      let w = imgEl.naturalWidth, h = imgEl.naturalHeight;
      if (Math.max(w, h) > maxDim) {
        const scale = maxDim / Math.max(w, h);
        w = Math.round(w * scale);
        h = Math.round(h * scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(imgEl, 0, 0, w, h);
      return canvas.toDataURL('image/jpeg', quality);
    }

    function applyManual() {
      const val = parseFloat(document.getElementById('manual-amount').value);
      if (!val || val <= 0) { alert('Please enter a valid amount'); return; }
      billAmount = val;
      document.getElementById('bill-amount-text').textContent = fmt(billAmount);
      document.getElementById('bill-display').style.display = 'block';
      document.getElementById('manual-section').style.display = 'none';
      populateTipButtons(billAmount);
      document.getElementById('tip-section').style.display = 'block';
    }

    function populateTipButtons(bill) {
      document.getElementById('tip-good').textContent = fmt(bill * 0.18);
      document.getElementById('tip-great').textContent = fmt(bill * 0.20);
      document.getElementById('tip-excel').textContent = fmt(bill * 0.25);
      document.getElementById('total-good').textContent = 'Total ' + fmt(bill * 1.18);
      document.getElementById('total-great').textContent = 'Total ' + fmt(bill * 1.20);
      document.getElementById('total-excel').textContent = 'Total ' + fmt(bill * 1.25);
    }

    function selectTip(tier, pct) {
      if (!billAmount) return;
      const tipAmt = billAmount * pct;
      const totalAmt = billAmount + tipAmt;
      const emojis = { Good: '👍', Great: '😊', Excellent: '⭐' };
      document.getElementById('chosen-tier-text').textContent = emojis[tier] + ' ' + tier;
      document.getElementById('res-bill').textContent = fmt(billAmount);
      document.getElementById('res-tip').textContent = fmt(tipAmt);
      document.getElementById('res-total').textContent = fmt(totalAmt);
      document.getElementById('result-card').style.display = 'block';
      document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function resetApp() {
      billAmount = null;
      document.getElementById('preview-container').style.display = 'none';
      document.getElementById('preview-img').src = '';
      document.getElementById('file-input').value = '';
      document.getElementById('manual-amount').value = '';
      hideResults();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function hideResults(keepProgress) {
      ['status-box','bill-display','tip-section','result-card','reset-btn','manual-section'].forEach(id => {
        document.getElementById(id).style.display = 'none';
      });
      if (!keepProgress) document.getElementById('progress-wrap').style.display = 'none';
      document.getElementById('analyze-btn').style.display = 'none';
    }

    function showStatus(cls, msg) {
      const box = document.getElementById('status-box');
      box.className = cls; box.style.whiteSpace = 'pre-line'; box.textContent = msg; box.style.display = 'block';
    }

    function fmt(n) { return '$' + n.toFixed(2); }
  </script>
</body>
</html>
